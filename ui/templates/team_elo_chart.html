{% set base_path = "../" %}
{% set active_page = "team" %}
{% extends "_base.html" %}

{% block title %}{{ team }} · Elo Trend · NFL Elo{% endblock %}

{% block content %}
<section class="card">
  <div class="cardrow" style="align-items: baseline;">
    <div>
      <h1 class="h1">{{ team }} Elo By Week</h1>
      <div class="muted">Regular Season {{ season }}</div>
    </div>

    <div class="controls">
      <a class="btn" href="{{ base_path }}team/{{ team|slug }}.html">← Back to {{ team }}</a>
      <a class="btn" href="{{ base_path }}index.html">Home</a>
    </div>
  </div>
</section>

<section class="card">
  <div class="chart-wrap" style="height: 420px;">
    <canvas id="eloChart"></canvas>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const TEAM_PRIMARY = {
    "Arizona Cardinals": "#97233F",
    "Atlanta Falcons": "#A71930",
    "Baltimore Ravens": "#241773",
    "Buffalo Bills": "#00338D",
    "Carolina Panthers": "#0085CA",
    "Chicago Bears": "#0B162A",
    "Cincinnati Bengals": "#FB4F14",
    "Cleveland Browns": "#311D00",
    "Dallas Cowboys": "#003594",
    "Denver Broncos": "#FB4F14",
    "Detroit Lions": "#0076B6",
    "Green Bay Packers": "#203731",
    "Houston Texans": "#03202F",
    "Indianapolis Colts": "#002C5F",
    "Jacksonville Jaguars": "#101820",
    "Kansas City Chiefs": "#E31837",
    "Las Vegas Raiders": "#000000",
    "Los Angeles Chargers": "#0080C6",
    "Los Angeles Rams": "#003594",
    "Miami Dolphins": "#008E97",
    "Minnesota Vikings": "#4F2683",
    "New England Patriots": "#002244",
    "New Orleans Saints": "#D3BC8D",
    "New York Giants": "#0B2265",
    "New York Jets": "#125740",
    "Philadelphia Eagles": "#004C54",
    "Pittsburgh Steelers": "#FFB612",
    "San Francisco 49ers": "#AA0000",
    "Seattle Seahawks": "#002244",
    "Tampa Bay Buccaneers": "#D50A0A",
    "Tennessee Titans": "#0C2340",
    "Washington Commanders": "#5A1414"
  };

  const weeks    = {{ weeks | tojson }};
  const series   = {{ series | tojson }};
  const teamName = {{ team | tojson }};
  const baseline = {{ baseline | tojson }};

  function hexToRgba(hex, a) {
    const h = (hex || "").replace("#", "");
    if (h.length !== 6) return `rgba(255,255,255,${a})`;
    const r = parseInt(h.slice(0, 2), 16);
    const g = parseInt(h.slice(2, 4), 16);
    const b = parseInt(h.slice(4, 6), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  const labels = weeks.map(w => `W${w}`);

  // Writes "Division rivals:" context line
  const rivals = series.map(s => s.team).filter(t => t !== teamName);

  // Main line is orange; rivals use team primary colors, dimmed
  const MAIN_COLOR = "rgba(255,165,0,1)";  // orange
  const RIVAL_ALPHA = 0.65;

  const datasets = series.map(s => {
    const isMain = (s.team === teamName);
    const baseHex = TEAM_PRIMARY[s.team] || "#FFFFFF";
    const rivalColor = hexToRgba(baseHex, RIVAL_ALPHA);

    return {
      label: isMain ? `${s.team} (Elo Score)` : `${s.team} (Division rival)`,
      data: s.elos,
      borderColor: isMain ? MAIN_COLOR : rivalColor,
      backgroundColor: "transparent",
      tension: 0,
      pointRadius: isMain ? 2 : 0,
      borderWidth: isMain ? 3 : 2,
      borderDash: isMain ? [] : [5, 5]
    };
  });

  datasets.push({
    label: "Baseline",
    data: weeks.map(() => baseline),
    borderColor: "rgba(255,255,255,0.6)",
    backgroundColor: "transparent",
    borderDash: [6, 6],
    tension: 0,
    pointRadius: 0,
    borderWidth: 1
  });

  new Chart(document.getElementById("eloChart"), {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true,
          position: "top",
          align: "start",
          labels: {
            color: "white",
            boxWidth: 30,
            boxHeight: 2,
            padding: 16,
            font: { size: 13, weight: "500" }
          }
        }
      },
      scales: {
        x: { title: { display: true, text: "Week" } },
        y: {
          title: { display: true, text: "Elo" },
          min: 1200,
          max: 1800,
          ticks: { stepSize: 100 }
        }
      }
    }
  });
</script>
{% endblock %}

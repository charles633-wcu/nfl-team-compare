{% extends "base.html" %}
{% block content %}
  <h2>Compare teams</h2>
  <form method="get" action="/compare" class="card">
    <label>Team A</label>
    <select name="team_a" required>
      {% for t in teams %}
        <option value="{{ t.id }}">{{ t.name }}</option>
      {% endfor %}
    </select>

    <label>Team B</label>
    <select name="team_b" required>
      {% for t in teams %}
        <option value="{{ t.id }}">{{ t.name }}</option>
      {% endfor %}
    </select>

    <button type="submit">Compare</button>
  </form>
{% endblock %}
